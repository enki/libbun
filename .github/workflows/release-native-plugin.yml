name: Release native plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version or tag name to publish, for example v0.1.0
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native-plugin:
    name: Build native plugin (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            plugin_name: liblibbun_plugin_native.dylib
            runtime_mode: in-process
            helper_name: ""
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            plugin_name: liblibbun_plugin_native.so
            runtime_mode: in-process
            helper_name: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            plugin_name: liblibbun_plugin_native.so
            runtime_mode: in-process
            helper_name: ""
    env:
      LIBBUN_NATIVE_BUILD_JOBS: "8"
      LIBBUN_NATIVE_BUN_BUILD_DIR: ${{ github.workspace }}/vendor/bun/build/native-${{ matrix.target }}
      LIBBUN_NATIVE_LINK_MANIFEST: ${{ github.workspace }}/vendor/bun/build/native-${{ matrix.target }}/libbun_native_link_manifest.txt
      BUN_CODEGEN_DIR: ${{ github.workspace }}/vendor/bun/build/native-${{ matrix.target }}/codegen
      LIBBUN_WEBKIT_PIC_REPO: enki/WebKit
      LIBBUN_WEBKIT_PIC_TAG: libbun-webkit-pic-5488984d-20260519
      LIBBUN_WEBKIT_PIC_TARGET: ${{ matrix.target }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install release tools
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install zstd llvm@21 ninja cmake
            echo "$(brew --prefix llvm@21)/bin" >> "$GITHUB_PATH"
          else
            sudo apt-get update
            sudo apt-get install -y zstd ninja-build cmake wget g++ gnupg
            wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
            chmod +x /tmp/llvm.sh
            sudo /tmp/llvm.sh 21 all
            echo "/usr/lib/llvm-21/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Rust toolchains
        run: |
          rustup toolchain install stable
          rustup toolchain install nightly-2026-05-06

      - name: Verify facade
        run: |
          cargo test
          cargo check --features dynamic-loading

      - name: Prepare native Bun link manifest
        run: |
          base_manifest="$LIBBUN_NATIVE_BUN_BUILD_DIR/libbun_native_link_manifest.txt"
          LIBBUN_NATIVE_LINK_MANIFEST="$base_manifest" LIBBUN_NATIVE_CLEAN_AFTER_MANIFEST=1 scripts/prepare-native-bun-link.sh
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.runtime_mode }}" == "in-process" ]]; then
            pic_manifest="$LIBBUN_NATIVE_BUN_BUILD_DIR/libbun_native_link_manifest.pic.txt"
            scripts/fetch-webkit-pic-artifact.sh \
              --target "${{ matrix.target }}" \
              --manifest "$base_manifest" \
              --out "$pic_manifest"
            echo "LIBBUN_NATIVE_LINK_MANIFEST=$pic_manifest" >> "$GITHUB_ENV"
          fi
          df -h /

      - name: Inspect Linux native relocations
        if: runner.os == 'Linux' && matrix.runtime_mode == 'in-process'
        run: scripts/inspect-linux-native-relocations.sh "$LIBBUN_NATIVE_LINK_MANIFEST"

      - name: Build native plugin
        run: |
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            CARGO_INCREMENTAL=0 CARGO_PROFILE_DEV_DEBUG=0 cargo +nightly-2026-05-06 build --manifest-path plugin/Cargo.toml
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            LIBBUN_NATIVE_LINK_BUN=1 \
            CARGO_INCREMENTAL=0 \
            CARGO_PROFILE_DEV_DEBUG=0 \
            RUSTFLAGS="-C link-arg=-fuse-ld=lld" \
            cargo +nightly-2026-05-06 build --manifest-path plugin/Cargo.toml --features linux-in-process
          else
            LIBBUN_NATIVE_LINK_BUN=1 CARGO_INCREMENTAL=0 CARGO_PROFILE_DEV_DEBUG=0 cargo +nightly-2026-05-06 build --manifest-path plugin/Cargo.toml
          fi

      - name: Build Linux native helper
        if: matrix.runtime_mode == 'helper-process'
        run: LIBBUN_NATIVE_LINK_BUN=1 CARGO_INCREMENTAL=0 CARGO_PROFILE_DEV_DEBUG=0 cargo +nightly-2026-05-06 build --manifest-path runtime/Cargo.toml

      - name: Verify dynamic plugin loading
        run: |
          set -o pipefail
          plugin_path="$(find plugin/target/debug -maxdepth 1 -name '${{ matrix.plugin_name }}' -print -quit)"
          test -n "$plugin_path"
          helper_path=""
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            helper_path="$(find runtime/target/debug -maxdepth 1 -name '${{ matrix.helper_name }}' -print -quit)"
            test -n "$helper_path"
          fi
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            env LIBBUN_PLUGIN_PATH="$plugin_path" LIBBUN_RUNTIME_NATIVE_PATH="$helper_path" \
              cargo test --features dynamic-loading dynamic_plugin_provider_flow -- --exact --nocapture 2>&1 | tee /tmp/libbun-dynamic-plugin-smoke.log
          else
            env -u LIBBUN_RUNTIME_NATIVE_PATH LIBBUN_PLUGIN_PATH="$plugin_path" \
              cargo test --features dynamic-loading dynamic_plugin_provider_flow -- --exact --nocapture 2>&1 | tee /tmp/libbun-dynamic-plugin-smoke.log
          fi
          if grep -q "mimalloc: error" /tmp/libbun-dynamic-plugin-smoke.log; then
            echo "dynamic plugin smoke emitted a mimalloc diagnostic" >&2
            exit 1
          fi
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            env LIBBUN_PLUGIN_PATH="$plugin_path" LIBBUN_RUNTIME_NATIVE_PATH="$helper_path" \
              cargo test --features dynamic-loading dynamic_plugin_facade_conformance -- --exact --nocapture 2>&1 | tee /tmp/libbun-dynamic-plugin-conformance.log
          else
            env -u LIBBUN_RUNTIME_NATIVE_PATH LIBBUN_PLUGIN_PATH="$plugin_path" \
              cargo test --features dynamic-loading dynamic_plugin_facade_conformance -- --exact --nocapture 2>&1 | tee /tmp/libbun-dynamic-plugin-conformance.log
          fi
          if grep -q "mimalloc: error" /tmp/libbun-dynamic-plugin-conformance.log; then
            echo "dynamic plugin conformance emitted a mimalloc diagnostic" >&2
            exit 1
          fi

      - name: Verify replacement plugin build path
        run: |
          set -o pipefail
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            helper_path="$(find runtime/target/debug -maxdepth 1 -name '${{ matrix.helper_name }}' -print -quit)"
            replacement_dir="$(mktemp -d)"
            cp "$helper_path" "$replacement_dir/${{ matrix.helper_name }}"
            plugin_path="$(find plugin/target/debug -maxdepth 1 -name '${{ matrix.plugin_name }}' -print -quit)"
            LIBBUN_PLUGIN_PATH="$plugin_path" LIBBUN_RUNTIME_NATIVE_PATH="$replacement_dir/${{ matrix.helper_name }}" \
              cargo test --features dynamic-loading dynamic_plugin_provider_flow -- --exact --nocapture 2>&1 | tee /tmp/libbun-replacement-plugin-smoke.log
            if grep -q "mimalloc: error" /tmp/libbun-replacement-plugin-smoke.log; then
              echo "replacement plugin smoke emitted a mimalloc diagnostic" >&2
              exit 1
            fi
          else
            replacement_target="$(mktemp -d)"
            if [[ "${{ runner.os }}" == "Linux" ]]; then
              LIBBUN_NATIVE_LINK_BUN=1 \
              CARGO_TARGET_DIR="$replacement_target" \
              CARGO_INCREMENTAL=0 \
              CARGO_PROFILE_DEV_DEBUG=0 \
              RUSTFLAGS="-C link-arg=-fuse-ld=lld" \
              cargo +nightly-2026-05-06 build --manifest-path plugin/Cargo.toml --features linux-in-process
            else
              LIBBUN_NATIVE_LINK_BUN=1 \
              CARGO_TARGET_DIR="$replacement_target" \
              CARGO_INCREMENTAL=0 \
              CARGO_PROFILE_DEV_DEBUG=0 \
              cargo +nightly-2026-05-06 build --manifest-path plugin/Cargo.toml
            fi
            replacement_plugin="$(find "$replacement_target/debug" -maxdepth 1 -name '${{ matrix.plugin_name }}' -print -quit)"
            test -n "$replacement_plugin"
            env -u LIBBUN_RUNTIME_NATIVE_PATH LIBBUN_PLUGIN_PATH="$replacement_plugin" \
              cargo test --features dynamic-loading dynamic_plugin_provider_flow -- --exact --nocapture 2>&1 | tee /tmp/libbun-replacement-plugin-smoke.log
            if grep -q "mimalloc: error" /tmp/libbun-replacement-plugin-smoke.log; then
              echo "replacement plugin smoke emitted a mimalloc diagnostic" >&2
              exit 1
            fi
          fi

      - name: Package release assets
        run: |
          version="${{ inputs.version || github.ref_name }}"
          plugin_path="$(find plugin/target/debug -maxdepth 1 -name '${{ matrix.plugin_name }}' -print -quit)"
          helper_path=""
          if [[ "${{ matrix.runtime_mode }}" == "helper-process" ]]; then
            helper_path="$(find runtime/target/debug -maxdepth 1 -name '${{ matrix.helper_name }}' -print -quit)"
          fi
          LIBBUN_NATIVE_RUNTIME_MODE="${{ matrix.runtime_mode }}" \
          LIBBUN_NATIVE_HELPER_BINARY="$helper_path" \
            scripts/package-native-plugin-release.sh "$version" "$plugin_path" "dist/native-plugin-${{ matrix.target }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libbun-native-plugin-${{ matrix.target }}
          path: dist/native-plugin-${{ matrix.target }}/*
          if-no-files-found: error

  publish-release:
    name: Publish native plugin release
    runs-on: ubuntu-24.04
    needs: build-native-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Install release tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: libbun-native-plugin-*
          path: dist/native-plugin-artifacts

      - name: Assemble release assets
        run: |
          version="${{ inputs.version || github.ref_name }}"
          mkdir -p dist/native-plugin
          find dist/native-plugin-artifacts -type f -name "libbun-plugin-native-${version}-*.tar.zst" ! -name "libbun-plugin-native-${version}-source.tar.zst" -exec cp {} dist/native-plugin/ \;
          for suffix in source.tar.zst NOTICE.txt licenses.json SOURCE.txt; do
            first="$(find dist/native-plugin-artifacts -type f -name "libbun-plugin-native-${version}-${suffix}" -print -quit)"
            test -n "$first"
            cp "$first" "dist/native-plugin/libbun-plugin-native-${version}-${suffix}"
          done
          python3 - "$version" <<'PY'
          import hashlib
          import pathlib
          import sys

          version = sys.argv[1]
          out = pathlib.Path("dist/native-plugin")
          checksums = out / f"libbun-plugin-native-{version}-checksums.txt"
          lines = []
          for path in sorted(out.iterdir()):
              if path.name == checksums.name:
                  continue
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}\n")
          checksums.write_text("".join(lines))
          PY
          scripts/verify-release-assets.sh --dir dist/native-plugin --version "$version"

      - name: Upload assembled release assets
        uses: actions/upload-artifact@v4
        with:
          name: libbun-native-plugin-release-assets
          path: dist/native-plugin/*
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          files: dist/native-plugin/*
          fail_on_unmatched_files: true
